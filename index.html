<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElifLego — Brick Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
      }
    }
    </script>
</head>
<body class="flex h-screen">

    <aside id="sidebar" class="w-64 h-full p-3 overflow-y-auto">
        <h1 class="text-xl font-bold text-center mb-2" style="text-shadow:0 0 10px currentColor;">ELIFLEGO</h1>

        <label class="block text-[11px] tracking-widest opacity-80">AESTHETIC</label>
        <select id="theme-select" class="mb-2"></select>

        <h2 class="section">COLOR</h2>
        <div id="color-row" class="flex flex-wrap gap-2 mb-1"></div>

        <div id="palette"></div>

        <div id="mode-pill" class="mode-pill">MODE: ORBIT — pick a piece</div>
        <button id="clear-all" class="block-button w-full mt-3" style="padding:8px;">Clear All</button>
    </aside>

    <main id="canvas-container" class="flex-1 h-full relative">
        <canvas id="lego-canvas"></canvas>
        <div class="zoom-controls">
            <button id="zoom-in" class="zoom-button">+</button>
            <button id="zoom-out" class="zoom-button">-</button>
        </div>
        <div class="controls-info">
            <p><b>Left-drag</b> orbit &nbsp; <b>Right-drag</b> pan &nbsp; <b>Wheel</b> zoom</p>
            <p><b>Move mouse</b> to slide the piece &nbsp; <b>Arrows</b> nudge 1 stud &nbsp; <b>R</b> rotate</p>
            <p><b>Click</b> place (green ok / red no support) &nbsp; <b>ESC</b> deselect → click a piece to delete</p>
        </div>
    </main>

    <script type="module" src="js/main.js"></script>
</body>
</html>
